name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Get version from tag
        id: version
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
          
      - name: Create build spec
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          
          $specContent = @"
          # -*- mode: python ; coding: utf-8 -*-
          from PyInstaller.utils.hooks import collect_all

          datas = [('data', 'data'), ('knowledge', 'knowledge'), ('themes', 'themes'), ('docs', 'docs')]
          binaries = []
          hiddenimports = ['google.genai', 'pystray._win32', 'PIL._tkinter_finder', 'sqlite3', 'cryptography', 'tkinter.filedialog', 'tkinter.messagebox', 'tkinter.scrolledtext', 'logging.handlers', 'json', 'csv', 'zipfile', 'shutil', 'subprocess', 'threading', 'urllib.request', 'urllib.error', 'pathlib', 'datetime', 're', 'atexit', 'time', 'socket', 'webbrowser', 'http.server', 'urllib.parse']
          tmp_ret = collect_all('tkinter')
          datas += tmp_ret[0]; binaries += tmp_ret[1]; hiddenimports += tmp_ret[2]

          a = Analysis(
              ['gui_app.py'],
              pathex=[],
              binaries=binaries,
              datas=datas,
              hiddenimports=hiddenimports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='KDP-Master-Suite',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=True,
              upx_exclude=[],
              name='KDP-Master-Suite',
          )
          "@
          
          $specContent | Out-File -FilePath "build.spec" -Encoding utf8
          
      - name: Build executable
        run: pyinstaller build.spec --clean
        shell: powershell
        
      - name: Create distribution folder
        run: |
          Compress-Archive -Path "dist\KDP-Master-Suite\*" -DestinationPath "KDP-Master-Suite-${{ steps.version.outputs.VERSION }}.zip" -Force
          
      - name: Update VERSION.txt
        run: |
          "${{ steps.version.outputs.VERSION }}" | Out-File -FilePath "VERSION.txt" -Encoding utf8
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            KDP-Master-Suite-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KDP-Master-Suite-${{ steps.version.outputs.VERSION }}
          path: KDP-Master-Suite-${{ steps.version.outputs.VERSION }}.zip